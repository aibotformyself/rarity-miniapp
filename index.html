<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Попа</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Основные стили */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #eee);
            padding: 16px;
            min-height: 100vh;
        }
        h2 { font-size: 20px; margin-bottom: 20px; text-align: center; font-weight: 700; }
        
        .section { margin-bottom: 16px; }
        .gift-label {
            font-size: 11px; font-weight: 700;
            color: var(--tg-theme-hint-color, #888);
            text-transform: uppercase; letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        /* Поле поиска подарка */
        .gift-search-wrap { position: relative; }
        .gift-search-input {
            width: 100%; padding: 12px 12px 12px 40px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.07);
            color: inherit; font-size: 16px; outline: none;
            transition: border-color 0.2s;
        }
        .gift-search-input:focus { border-color: var(--tg-theme-button-color, #5b5fcf); }
        .gift-search-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            font-size: 16px; opacity: 0.6; pointer-events: none;
        }

        /* Выпадающий список */
        .gift-dropdown {
            display: none; position: absolute; left: 0; right: 0; z-index: 1000;
            background: #1e1e35; border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px; max-height: 250px; overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 6px;
        }
        .gift-dropdown.open { display: block; }
        .gift-option {
            padding: 12px 16px; font-size: 15px; cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .gift-option:active { background: rgba(91,95,207,0.3); }
        .gift-option.selected { color: var(--tg-theme-button-color, #5b5fcf); font-weight: 600; }

        /* Аккордеоны */
        .collapsible {
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; overflow: hidden; margin-bottom: 12px;
            background: rgba(255,255,255,0.03);
        }
        .collapsible-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px; cursor: pointer; user-select: none;
        }
        .collapsible-header .title { font-size: 14px; font-weight: 600; color: var(--tg-theme-hint-color, #aaa); }
        .badge-count {
            font-size: 12px; font-weight: 700;
            color: #fff; background: var(--tg-theme-button-color, #5b5fcf);
            border-radius: 8px; padding: 2px 8px; margin-right: 8px;
        }
        .collapsible-body { display: none; padding: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
        .collapsible-body.open { display: block; }

        /* Сетка чипсов */
        .chips-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .chip {
            padding: 10px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            font-size: 13px; cursor: pointer; text-align: center; transition: all 0.2s;
        }
        .chip.selected {
            background: var(--tg-theme-button-color, #5b5fcf);
            border-color: transparent; color: #fff;
        }
        .chip-rarity { display: block; font-size: 10px; opacity: 0.7; margin-top: 2px; }

        /* Кнопки */
        .btn {
            width: 100%; padding: 16px; border-radius: 14px;
            border: none; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: transform 0.1s, opacity 0.2s;
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-start { background: var(--tg-theme-button-color, #5b5fcf); color: #fff; }
        .btn-stop { background: #e74c3c; color: #fff; display: none; margin-top: 8px; }

        .status-bar {
            text-align: center; font-size: 13px; margin-top: 16px;
            padding: 10px; border-radius: 10px; min-height: 40px;
            background: rgba(255,255,255,0.03); color: var(--tg-theme-hint-color, #888);
        }
        .status-bar.active { color: #2ecc71; background: rgba(46, 204, 113, 0.1); }

        /* Список находок */
        .found-list { margin-top: 24px; }
        .found-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 16px; margin-bottom: 12px;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .item-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .source-tag { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #5b5fcf; }
        .price-val { font-size: 18px; font-weight: 800; color: #2ecc71; }
        .model-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .rarity-badge { background: rgba(91,95,207,0.2); color: #a2a5ff; padding: 2px 8px; border-radius: 6px; font-size: 12px; }
        .buy-btn {
            display: block; width: 100%; text-align: center;
            background: rgba(52, 152, 219, 0.15); color: #3498db;
            border: 1px solid rgba(52, 152, 219, 0.4);
            padding: 10px; border-radius: 10px; text-decoration: none;
            font-weight: 600; margin-top: 12px;
        }
        .empty { text-align: center; color: #666; padding: 40px 0; font-size: 14px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h2>🔍 Rarity Monitor</h2>

    <div class="section">
        <div class="gift-label">Выберите подарок</div>
        <div class="gift-search-wrap" id="giftSearchWrap">
            <span class="gift-search-icon">🎁</span>
            <input class="gift-search-input" id="giftSearchInput" type="text" placeholder="Загрузка..." autocomplete="off">
            <div class="gift-dropdown" id="giftDropdown"></div>
        </div>
    </div>

    <div class="collapsible" id="modelsCollapsible">
        <div class="collapsible-header" onclick="toggleCollapsible('models')">
            <span class="title" id="modelsTitle">Модели</span>
            <div class="right" style="display: flex; align-items: center;">
                <span class="badge-count" id="selectedCount">0</span>
                <span>▼</span>
            </div>
        </div>
        <div class="collapsible-body" id="modelsBody">
            <div class="chips-grid" id="modelsGrid"></div>
        </div>
    </div>

    <button class="btn btn-start" id="btnStart" onclick="startMonitor()">▶ Запустить мониторинг</button>
    <button class="btn btn-stop" id="btnStop" onclick="stopMonitor()">⏹ Остановить</button>

    <div class="status-bar" id="statusBar">Выберите подарок и нажмите старт</div>

    <div class="found-list" id="foundList"></div>

    <script>
        const API = 'https://unperforated-levi-supernumerous.ngrok-free.dev';
        const tg = window.Telegram?.WebApp;
        
        // КРИТИЧЕСКОЕ ИСПРАВЛЕНИЕ: берем реальный ID или тестовый
        const USERID = tg?.initDataUnsafe?.user?.id || 6525022620; 

        let gifts = [];
        let selectedModels = new Set();
        let _selectedGift = '';
        let pollTimer = null;

        tg?.expand();

        // 1. Загрузка списка подарков
        async function loadGifts() {
            try {
                const r = await fetch(`${API}/gifts`, { headers: { 'ngrok-skip-browser-warning': 'true' } });
                gifts = await r.json();
                document.getElementById('giftSearchInput').placeholder = 'Поиск...';
                renderGiftDropdown(gifts);
                
                // После загрузки подарков проверяем статус монитора
                checkInitialStatus();
            } catch(e) {
                setStatus('Ошибка связи с бэкендом', 'error');
            }
        }

        function renderGiftDropdown(list) {
            const dd = document.getElementById('giftDropdown');
            dd.innerHTML = list.map(g => `
                <div class="gift-option" onclick="selectGift('${g.name.replace(/'/g, "\\'")}')">${g.name}</div>
            `).join('');
        }

        window.selectGift = (name) => {
            _selectedGift = name;
            document.getElementById('giftSearchInput').value = name;
            document.getElementById('giftDropdown').classList.remove('open');
            onGiftChange();
        };

        // Обработка поиска подарка
        document.getElementById('giftSearchInput').onfocus = () => document.getElementById('giftDropdown').classList.add('open');
        document.getElementById('giftSearchInput').oninput = (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = gifts.filter(g => g.name.toLowerCase().includes(q));
            renderGiftDropdown(filtered);
        };

        function onGiftChange() {
            const gift = gifts.find(g => g.name === _selectedGift);
            if (!gift) return;
            
            selectedModels.clear();
            const grid = document.getElementById('modelsGrid');
            const models = gift.all_models || [];
            
            grid.innerHTML = models.map(m => `
                <div class="chip" onclick="this.classList.toggle('selected'); toggleModel('${m.name}')">
                    ${m.name}
                    <span class="chip-rarity">${m.rarity_per_mille || m.rarity}%</span>
                </div>
            `).join('');
            updateCount();
        }

        function toggleModel(name) {
            selectedModels.has(name) ? selectedModels.delete(name) : selectedModels.add(name);
            updateCount();
        }

        function updateCount() {
            document.getElementById('selectedCount').textContent = selectedModels.size;
        }

        function toggleCollapsible(id) {
            document.getElementById(id + 'Body').classList.toggle('open');
        }

        // 2. Управление мониторингом
        async function startMonitor() {
            if (!_selectedGift) return setStatus('Выберите подарок!', 'error');

            const payload = {
                user_id: USERID,
                gift_name: _selectedGift,
                models: [...selectedModels],
                backdrops: [],
                rarity_max: 3.0
            };

            try {
                const r = await fetch(`${API}/monitor/start`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify(payload)
                });

                if (r.ok) {
                    setStatus('✅ Мониторинг запущен', 'active');
                    document.getElementById('btnStart').style.display = 'none';
                    document.getElementById('btnStop').style.display = 'block';
                    startPolling();
                }
            } catch (e) { setStatus('Ошибка старта', 'error'); }
        }

        async function stopMonitor() {
            clearInterval(pollTimer);
            await fetch(`${API}/monitor/stop`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                body: JSON.stringify({ user_id: USERID })
            });
            document.getElementById('btnStart').style.display = 'block';
            document.getElementById('btnStop').style.display = 'none';
            setStatus('Монитор остановлен');
        }

        // 3. Получение данных (Polling)
        function startPolling() {
            clearInterval(pollTimer);
            fetchFound(); // Первый запрос сразу
            pollTimer = setInterval(fetchFound, 5000);
        }

        async function fetchFound() {
            try {
                const r = await fetch(`${API}/monitor/found/${USERID}`, { 
                    headers: { 'ngrok-skip-browser-warning': 'true' } 
                });
                const data = await r.json();
                renderCards(data.found);
            } catch (e) { console.error("Ошибка обновления лотов"); }
        }

        function renderCards(items) {
            const list = document.getElementById('foundList');
            if (!items || items.length === 0) {
                list.innerHTML = '<div class="empty">Ожидание подходящих лотов...</div>';
                return;
            }

            list.innerHTML = [...items].reverse().map(item => `
                <div class="found-item">
                    <div class="item-row">
                        <span class="source-tag">🏛 ${item.source}</span>
                        <span class="price-val">${item.price_ton} TON</span>
                    </div>
                    <div class="model-name">${item.model}</div>
                    <span class="rarity-badge">${item.model_rarity}% rarity</span>
                    <a href="${item.url}" target="_blank" class="buy-btn">Смотреть в Маркете</a>
                </div>
            `).join('');
        }

        // Проверка статуса при входе
        async function checkInitialStatus() {
            try {
                const r = await fetch(`${API}/monitor/found/${USERID}`, { 
                    headers: { 'ngrok-skip-browser-warning': 'true' } 
                });
                const data = await r.json();
                if (data.running) {
                    document.getElementById('btnStart').style.display = 'none';
                    document.getElementById('btnStop').style.display = 'block';
                    setStatus('✅ Мониторинг активен', 'active');
                    startPolling();
                }
            } catch(e) {}
        }

        function setStatus(msg, cls = '') {
            const s = document.getElementById('statusBar');
            s.textContent = msg;
            s.className = 'status-bar ' + cls;
        }

        // Инициализация
        loadGifts();

        // Закрытие списка при клике мимо
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#giftSearchWrap')) {
                document.getElementById('giftDropdown').classList.remove('open');
            }
        });
    </script>
</body>
</html>
