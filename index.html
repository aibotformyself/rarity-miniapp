<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rarity Monitor</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --card-radius: 20px; --accent: var(--tg-theme-button-color, #5b5fcf); }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #eee);
            padding: 16px; min-height: 100vh;
        }
        h2 { font-size: 20px; margin-bottom: 20px; text-align: center; font-weight: 800; }
        .section { margin-bottom: 12px; }
        .field-label {
            font-size: 11px; font-weight: 800;
            color: var(--tg-theme-hint-color, #888);
            text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px;
        }
        @keyframes popIn { 0%{opacity:0;transform:scale(0.95) translateY(5px)}100%{opacity:1;transform:scale(1) translateY(0)} }
        @keyframes slideDown { 0%{opacity:0;transform:translateY(-10px)}100%{opacity:1;transform:translateY(0)} }
        @keyframes spin { to{transform:rotate(360deg)} }

        /* ── Gift search ── */
        .gift-search-wrap { position: relative; }
        .gift-search-input {
            width: 100%; padding: 12px 12px 12px 40px;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.07); color: inherit;
            font-size: 16px; outline: none;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .gift-search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(91,95,207,0.2);
        }
        .gift-search-icon {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%); font-size: 16px;
            opacity: 0.6; pointer-events: none;
        }
        .gift-dropdown {
            display: none; position: absolute; left: 0; right: 0;
            z-index: 1000; background: #1e1e35;
            border: 1px solid rgba(255,255,255,0.15); border-radius: 12px;
            max-height: 250px; overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 6px; animation: slideDown 0.2s ease-out;
        }
        .gift-dropdown.open { display: block; }
        .gift-option {
            display: flex; align-items: center; gap: 10px;
            width: 100%; padding: 10px 16px; font-size: 15px;
            cursor: pointer; border: none; background: transparent;
            color: inherit; text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s; touch-action: manipulation;
        }
        .gift-option:hover  { background: rgba(255,255,255,0.05); }
        .gift-option:active { background: rgba(91,95,207,0.3); }
        .dropdown-icon { width: 26px; height: 26px; border-radius: 6px; object-fit: cover; flex: 0 0 auto; }

        /* ── Collapsibles ── */
        .collapsible {
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            overflow: hidden; margin-bottom: 12px;
            background: rgba(255,255,255,0.03);
        }
        .collapsible-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 13px 14px; cursor: pointer;
            user-select: none; touch-action: manipulation; gap: 10px;
        }
        .collapsible-header .title {
            font-size: 12px; font-weight: 800;
            color: var(--tg-theme-hint-color, #aaa);
            text-transform: uppercase; letter-spacing: 0.7px;
        }
        .header-right { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
        .badge-count {
            font-size: 12px; font-weight: 800; color: #fff;
            background: var(--accent); border-radius: 8px; padding: 2px 8px;
            transition: transform 0.2s;
        }
        .clear-btn {
            border: none; background: rgba(255,255,255,0.08); color: #fff;
            font-size: 11px; font-weight: 700; padding: 5px 8px;
            border-radius: 8px; cursor: pointer; display: none; touch-action: manipulation;
        }
        .clear-btn.visible { display: inline-flex; }
        .clear-btn:active  { background: rgba(255,255,255,0.14); }
        .coll-arrow { transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); display: inline-block; font-size: 12px; }
        .collapsible-body {
            max-height: 0; overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
            border-top: 1px solid transparent;
        }
        .collapsible-body.open {
            max-height: 620px;
            border-top: 1px solid rgba(255,255,255,0.05);
            overflow-y: auto;
        }
        .chips-search {
            width: 100%; padding: 10px 12px; border: none; outline: none;
            background: rgba(255,255,255,0.05); color: inherit; font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .chips-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .chip {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 10px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
            animation: popIn 0.3s ease-out backwards;
            touch-action: manipulation; min-width: 0;
        }
        .chip:active { transform: scale(0.96); }
        .chip.selected {
            background: var(--accent); border-color: transparent; color: #fff;
            box-shadow: 0 4px 12px rgba(91,95,207,0.3);
        }
        .chip.hidden-chip { display: none; }
        .chip-icon  { width: 30px; height: 30px; border-radius: 6px; object-fit: contain; flex: 0 0 auto; }
        .chip-info  { display: flex; flex-direction: column; text-align: left; min-width: 0; }
        .chip-name  { font-size: 13px; font-weight: 700; line-height: 1.2; word-break: break-word; }
        .chip-rarity{ font-size: 11px; opacity: 0.7; margin-top: 2px; }

        /* ── Price filter ── */
        .price-filter-row { display: flex; align-items: center; gap: 10px; }
        .price-input {
            flex: 1; padding: 12px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.07); color: inherit;
            font-size: 15px; outline: none;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            -moz-appearance: textfield;
        }
        .price-input::-webkit-outer-spin-button,
        .price-input::-webkit-inner-spin-button { -webkit-appearance: none; }
        .price-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,95,207,0.2); }
        .price-separator { color: #888; font-weight: 700; flex: 0 0 auto; font-size: 18px; }

        /* ── Buttons ── */
        .btn {
            width: 100%; padding: 15px; border-radius: 14px; border: none;
            font-size: 16px; font-weight: 800; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1); touch-action: manipulation;
        }
        .btn:active  { transform: scale(0.97); }
        .btn-start   { background: var(--accent); color: #fff; }
        .btn-stop    { background: #e74c3c; color: #fff; display: none; margin-top: 8px; }

        /* ── Status bar ── */
        .status-bar {
            text-align: center; font-size: 13px; margin-top: 10px;
            padding: 10px; border-radius: 10px;
            background: rgba(255,255,255,0.03);
            color: var(--tg-theme-hint-color, #888); transition: all 0.3s;
        }
        .status-bar.active { color: #2ecc71; background: rgba(46,204,113,0.08); }
        .status-bar.error  { color: #e74c3c; background: rgba(231,76,60,0.08); }

        /* ── Found list ── */
        .found-list { margin-top: 20px; }
        .found-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 10px; gap: 10px;
        }
        .found-count { font-size: 11px; font-weight: 800; color: #888; }
        .sort-btn {
            display: flex; align-items: center; gap: 5px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px; padding: 5px 10px;
            font-size: 12px; font-weight: 700; color: #aaa;
            cursor: pointer; touch-action: manipulation;
        }
        .sort-btn:active { background: rgba(255,255,255,0.12); }

        /* ── Cards ── */
        .found-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .found-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--card-radius); overflow: hidden;
            cursor: pointer; display: flex; flex-direction: column;
            transition: transform 0.18s cubic-bezier(0.4,0,0.2,1), border-color 0.18s, box-shadow 0.18s;
            animation: popIn 0.4s ease-out backwards; touch-action: manipulation; min-width: 0;
        }
        .found-item:active {
            transform: scale(0.96);
            border-color: rgba(91,95,207,0.5);
            box-shadow: 0 4px 20px rgba(91,95,207,0.2);
        }
        /* Card image */
        .card-media {
            position: relative; width: 100%; aspect-ratio: 1/1;
            overflow: hidden; background: rgba(255,255,255,0.06);
        }
        .card-media img, .card-media lottie-player {
            position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
        }
        .card-media .media-fallback {
            display: flex; align-items: center; justify-content: center;
            position: absolute; inset: 0; font-size: 44px;
        }
        /* Market source badge top-left */
        .card-overlay-top {
            position: absolute; top: 7px; left: 7px; z-index: 3; pointer-events: none;
        }
        .source-tag-img {
            font-size: 9px; font-weight: 800; text-transform: uppercase;
            color: #fff; background: rgba(0,0,0,0.55);
            padding: 3px 7px; border-radius: 6px; backdrop-filter: blur(4px);
        }
        /* Card bottom info bar — name row + buy button */
        .item-body {
            padding: 8px 8px 6px;
            display: flex; flex-direction: column; gap: 6px;
            background: rgba(255,255,255,0.03);
        }
        .item-name-row {
            display: flex; align-items: baseline; justify-content: space-between; gap: 4px;
        }
        .item-gift-name {
            font-size: 12px; font-weight: 800; color: #eee;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            flex: 1 1 auto; min-width: 0;
        }
        .item-num {
            font-size: 10px; font-weight: 700; color: #666;
            white-space: nowrap; flex: 0 0 auto;
        }
        /* Rarity badges */
        .item-badges { display: flex; flex-wrap: wrap; gap: 3px; }
        .ibadge { font-size: 10px; padding: 2px 5px; border-radius: 5px; font-weight: 700; }
        .ibadge-model    { background: rgba(91,95,207,0.22); color: #a2a5ff; }
        .ibadge-backdrop { background: rgba(52,152,219,0.15); color: #74b9ff; }
        /* Buy/price button at bottom of card */
        .card-buy-btn {
            display: flex; align-items: center; justify-content: center; gap: 5px;
            width: 100%; padding: 9px 6px;
            background: var(--accent); color: #fff;
            border-radius: 10px; border: none;
            font-size: 13px; font-weight: 800;
            cursor: pointer; touch-action: manipulation;
            transition: opacity 0.15s, transform 0.15s;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .card-buy-btn:active { opacity: 0.82; transform: scale(0.97); }
        .card-buy-icon { font-size: 11px; opacity: 0.85; }

        /* ── Scroll sentinel ── */
        .load-sentinel { height: 70px; display: flex; align-items: center; justify-content: center; margin-top: 4px; }
        .load-spinner {
            width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        .load-done-tag {
            font-size: 12px; color: #555; padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.06); border-radius: 20px;
            background: rgba(255,255,255,0.02);
        }

        /* ── Sort sheet ── */
        .sort-overlay {
            display: none; position: fixed; inset: 0; z-index: 3000;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            opacity: 0; transition: opacity 0.25s;
        }
        .sort-overlay.open { display: flex; align-items: flex-end; justify-content: center; opacity: 1; }
        .sort-sheet {
            background: #1e1e35; border-radius: 20px 20px 0 0;
            width: 100%; padding: 8px 0 32px;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .sort-overlay.open .sort-sheet { transform: translateY(0); }
        .sort-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 10px auto 16px; }
        .sort-title {
            font-size: 13px; font-weight: 800; color: #888; text-transform: uppercase;
            letter-spacing: 0.7px; padding: 0 20px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .sort-option {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px; font-size: 15px; cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            touch-action: manipulation; transition: background 0.15s;
        }
        .sort-option:active { background: rgba(255,255,255,0.06); }
        .sort-option.active { color: var(--accent); font-weight: 700; }
        .sort-option .sort-arrow { font-size: 14px; opacity: 0.5; }

        /* ── Modal — new compact design ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
            align-items: flex-end; justify-content: center;
            opacity: 0; transition: opacity 0.3s;
        }
        .modal-overlay.open { display: flex; opacity: 1; }
        .modal-sheet {
            position: relative; background: #1e1e35;
            border-radius: 24px 24px 0 0; width: 100%;
            max-height: 92vh; overflow-y: auto; padding: 0 0 32px;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .modal-overlay.open .modal-sheet { transform: translateY(0); }
        .modal-handle {
            width: 36px; height: 4px; background: rgba(255,255,255,0.2);
            border-radius: 2px; margin: 12px auto 18px;
        }
        .modal-close {
            position: absolute; top: 14px; right: 14px;
            width: 28px; height: 28px; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.12); border-radius: 50%;
            color: #fff; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; touch-action: manipulation; transition: background 0.15s;
        }
        .modal-close:active { background: rgba(255,255,255,0.2); }

        /* Compact top section */
        .modal-top {
            display: flex; align-items: center; gap: 14px;
            padding: 0 20px 16px;
        }
        /* Square gift image */
        .modal-thumb-wrap {
            position: relative;
            width: 80px; height: 80px; flex: 0 0 80px;
            border-radius: 16px; overflow: hidden;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }
        .modal-thumb-wrap img,
        .modal-thumb-wrap lottie-player {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; inset: 0;
        }
        /* Small TG badge bottom-left of thumb */
        .modal-tg-badge {
            position: absolute; bottom: 5px; left: 5px; z-index: 4;
            width: 22px; height: 22px; border-radius: 50%;
            background: #2ca5e0; display: flex; align-items: center; justify-content: center;
            font-size: 11px; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.25);
            text-decoration: none;
        }
        .modal-thumb-fallback {
            display: flex; align-items: center; justify-content: center;
            position: absolute; inset: 0; font-size: 34px;
        }
        .modal-info { flex: 1; min-width: 0; }
        .modal-gift-label {
            font-size: 10px; font-weight: 800; color: #666;
            text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 3px;
        }
        .modal-model-name {
            font-size: 18px; font-weight: 900; line-height: 1.15;
            color: #fff; margin-bottom: 3px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .modal-number { font-size: 13px; color: #555; margin-bottom: 8px; }
        .modal-source-badge {
            display: inline-block; font-size: 10px; font-weight: 800;
            background: rgba(255,255,255,0.1); border-radius: 6px;
            padding: 2px 7px; color: #aaa;
        }

        /* Attribute table */
        .modal-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 0 20px; }
        .modal-rows { padding: 4px 20px 0; }
        .modal-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 10px;
        }
        .modal-row:last-child { border-bottom: none; }
        .modal-row-label { font-size: 13px; color: #777; white-space: nowrap; }
        .modal-row-right { display: flex; align-items: center; gap: 7px; min-width: 0; justify-content: flex-end; }
        .modal-row-val { font-size: 13px; font-weight: 800; word-break: break-word; text-align: right; }
        .modal-row-rarity {
            font-size: 10px; color: #a2a5ff;
            background: rgba(91,95,207,0.18); padding: 2px 6px; border-radius: 5px; flex: 0 0 auto;
        }

        /* Buy button row */
        .modal-actions { padding: 16px 20px 0; }
        .modal-buy-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 16px; border-radius: 14px;
            background: var(--accent); color: #fff;
            font-size: 16px; font-weight: 800;
            border: none; width: 100%; cursor: pointer;
            touch-action: manipulation; transition: opacity 0.15s, transform 0.15s;
            /* prevent overflow */
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            box-sizing: border-box;
        }
        .modal-buy-btn:active { opacity: 0.85; transform: scale(0.98); }

        .empty-state {
            text-align: center; padding: 40px 20px; color: #666;
            display: flex; flex-direction: column; align-items: center; gap: 14px;
        }
    </style>
</head>
<body>

<h2>🔍 Rarity Monitor</h2>

<div class="section">
    <div class="field-label">Подарок</div>
    <div class="gift-search-wrap" id="giftSearchWrap">
        <span class="gift-search-icon">🎁</span>
        <input class="gift-search-input" id="giftSearchInput" type="text" placeholder="Загрузка..." autocomplete="off">
        <div class="gift-dropdown" id="giftDropdown"></div>
    </div>
</div>

<div class="collapsible">
    <div class="collapsible-header" onclick="toggleCollapsible('models')">
        <span class="title">Модели</span>
        <div class="header-right">
            <button class="clear-btn" id="clearModelsBtn" onclick="event.stopPropagation(); clearSelection('models')">Очистить</button>
            <span class="badge-count" id="modelsCount">0</span>
            <span class="coll-arrow" id="modelsArrow">▼</span>
        </div>
    </div>
    <div class="collapsible-body" id="modelsBody">
        <input class="chips-search" id="modelsSearch" placeholder="Поиск модели..." oninput="filterChips('models', this.value)">
        <div class="chips-grid" id="modelsGrid"></div>
    </div>
</div>

<div class="collapsible">
    <div class="collapsible-header" onclick="toggleCollapsible('backdrops')">
        <span class="title">Фоны</span>
        <div class="header-right">
            <button class="clear-btn" id="clearBackdropsBtn" onclick="event.stopPropagation(); clearSelection('backdrops')">Очистить</button>
            <span class="badge-count" id="backdropsCount">0</span>
            <span class="coll-arrow" id="backdropsArrow">▼</span>
        </div>
    </div>
    <div class="collapsible-body" id="backdropsBody">
        <input class="chips-search" id="backdropsSearch" placeholder="Поиск фона..." oninput="filterChips('backdrops', this.value)">
        <div class="chips-grid" id="backdropsGrid"></div>
    </div>
</div>

<div class="section">
    <div class="field-label">Цена (TON)</div>
    <div class="price-filter-row">
        <input class="price-input" id="priceMin" type="number" placeholder="от" min="0" step="0.01">
        <span class="price-separator">—</span>
        <input class="price-input" id="priceMax" type="number" placeholder="до" min="0" step="0.01">
    </div>
</div>

<button class="btn btn-start" id="btnStart" onclick="startMonitor()">▶ Запустить мониторинг</button>
<button class="btn btn-stop"  id="btnStop"  onclick="stopMonitor()">⏹ Остановить</button>
<div class="status-bar" id="statusBar">Настройте параметры и нажмите Запустить</div>

<div class="found-list" id="foundList"></div>

<!-- Sort sheet -->
<div class="sort-overlay" id="sortOverlay" onclick="closeSortSheet(event)">
    <div class="sort-sheet">
        <div class="sort-handle"></div>
        <div class="sort-title">Сортировка</div>
        <div class="sort-option" data-sort="price_asc"    onclick="applySort('price_asc')">   <span>Цена: от низкой к высокой</span>    <span class="sort-arrow">↑</span></div>
        <div class="sort-option" data-sort="price_desc"   onclick="applySort('price_desc')">  <span>Цена: от высокой к низкой</span>   <span class="sort-arrow">↓</span></div>
        <div class="sort-option" data-sort="num_asc"      onclick="applySort('num_asc')">     <span>ID подарка: по возрастанию</span>   <span class="sort-arrow">↑</span></div>
        <div class="sort-option" data-sort="num_desc"     onclick="applySort('num_desc')">    <span>ID подарка: по убыванию</span>     <span class="sort-arrow">↓</span></div>
        <div class="sort-option" data-sort="rarity_asc"   onclick="applySort('rarity_asc')">  <span>Редкость: от низкой к высокой</span><span class="sort-arrow">↑</span></div>
        <div class="sort-option" data-sort="rarity_desc"  onclick="applySort('rarity_desc')"> <span>Редкость: от высокой к низкой</span><span class="sort-arrow">↓</span></div>
    </div>
</div>

<!-- Item modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal-sheet" id="modalSheet">
        <div class="modal-handle"></div>
        <button class="modal-close" onclick="closeModalDirect()">✕</button>

        <!-- Compact header -->
        <div class="modal-top">
            <div class="modal-thumb-wrap" id="modalThumb" onclick="_modalOpenGift()">
                <!-- filled by JS -->
            </div>
            <div class="modal-info">
                <div class="modal-gift-label"  id="modalGiftLabel"></div>
                <div class="modal-model-name"  id="modalModelName"></div>
                <div class="modal-number"      id="modalNumber"></div>
                <span class="modal-source-badge" id="modalSource"></span>
            </div>
        </div>

        <div class="modal-divider"></div>

        <!-- Attribute rows -->
        <div class="modal-rows" id="modalRows"></div>

        <!-- Buy button -->
        <div class="modal-actions">
            <button class="modal-buy-btn" id="modalBuyBtn"></button>
        </div>
    </div>
</div>

<script>
    const API    = 'https://unperforated-levi-supernumerous.ngrok-free.dev';
    const tg     = window.Telegram?.WebApp;
    const USERID = tg?.initDataUnsafe?.user?.id || 6525022620;
    const H      = { 'ngrok-skip-browser-warning': 'true' };
    const DOM_PAGE_SIZE = 30;

    let gifts           = [];
    let selectedModels  = new Set();
    let selectedBackdrops = new Set();
    let _selectedGift   = '';
    let pollTimer       = null;
    let allItems        = [];
    let sortedItems     = [];
    let renderedCount   = 0;
    let currentSort     = 'price_asc';
    let scrollObserver  = null;

    // Search state
    let searchPage       = 0;
    let searchTotalPages = 1;
    let searchLoading    = false;
    let searchDone       = false;
    let searchGift       = '';
    let searchModels     = [];
    let searchBackdrops  = [];
    let searchPriceMin   = null;
    let searchPriceMax   = null;

    // Modal state
    let _modalGiftUrl   = '';
    let _modalMarketUrl = '';

    tg?.expand();

    // ── Helpers ───────────────────────────────────────────────
    function setStatus(text, type = '') {
        const el = document.getElementById('statusBar');
        if (!el) return;
        el.textContent = text;
        el.className = 'status-bar' + (type ? ` ${type}` : '');
    }

    function escapeHtml(s) {
        return String(s ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;')
            .replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
    }

    function formatPct(val) {
        if (val == null || val === '' || val === 0) return null;
        const n = parseFloat(val);
        return (Number.isFinite(n) && n !== 0) ? n + '%' : null;
    }

    function formatPrice(val) {
        const n = Number(val);
        if (!Number.isFinite(n)) return '?';
        return Number.isInteger(n) ? String(n) : n.toFixed(2).replace(/\.00$/,'');
    }

    function normalizeRarityValue(item) {
        const v = item?.rarity_per_mille ?? item?.rarity ?? 0;
        const n = Number(v);
        return Number.isFinite(n) ? n : 0;
    }

    function sortByRarityAsc(items) {
        return [...items].sort((a,b) => {
            const ra = normalizeRarityValue(a), rb = normalizeRarityValue(b);
            if (ra !== rb) return ra - rb;
            return String(a.name||'').localeCompare(String(b.name||''), 'ru');
        });
    }

    function openTelegramLink(url) {
        if (!url || url === '#') return;
        if (tg?.openTelegramLink) { tg.openTelegramLink(url); return; }
        if (tg?.openLink)         { tg.openLink(url);         return; }
        window.open(url, '_blank', 'noopener,noreferrer');
    }
    window.openTelegramLink = openTelegramLink;

    window._modalOpenGift   = () => openTelegramLink(_modalGiftUrl);
    window._modalOpenMarket = () => openTelegramLink(_modalMarketUrl || _modalGiftUrl);

    // ── Chips ─────────────────────────────────────────────────
    function updateClearButtons() {
        document.getElementById('clearModelsBtn')?.classList.toggle('visible', selectedModels.size > 0);
        document.getElementById('clearBackdropsBtn')?.classList.toggle('visible', selectedBackdrops.size > 0);
    }

    function clearSelection(kind) {
        const set    = kind === 'models' ? selectedModels    : selectedBackdrops;
        const gridId = kind === 'models' ? 'modelsGrid'      : 'backdropsGrid';
        const cntId  = kind === 'models' ? 'modelsCount'     : 'backdropsCount';
        set.clear();
        document.getElementById(cntId).textContent = '0';
        document.querySelectorAll(`#${gridId} .chip.selected`).forEach(c => c.classList.remove('selected'));
        updateClearButtons();
    }
    window.clearSelection = clearSelection;

    async function loadGifts() {
        try {
            const r = await fetch(`${API}/gifts`, { headers: H });
            if (!r.ok) throw new Error();
            gifts = await r.json();
            document.getElementById('giftSearchInput').placeholder = 'Поиск подарка...';
            renderGiftDropdown(gifts);
            checkInitialStatus();
        } catch {
            setStatus('Ошибка связи с сервером', 'error');
            document.getElementById('giftSearchInput').placeholder = 'Не удалось загрузить';
        }
    }

    function renderGiftDropdown(list) {
        const dd = document.getElementById('giftDropdown');
        dd.innerHTML = '';
        if (!list.length) {
            dd.innerHTML = '<div class="gift-option" style="color:#666;cursor:default;">Ничего не найдено</div>';
            return;
        }
        list.forEach(g => {
            const item = document.createElement('div');
            item.className = 'gift-option';
            if (g.image_url || g.icon) {
                const img = document.createElement('img');
                img.className = 'dropdown-icon'; img.src = g.image_url || g.icon;
                img.onerror = () => { img.style.display='none'; };
                item.appendChild(img);
            } else {
                const sp = document.createElement('span'); sp.textContent = '🎁';
                item.appendChild(sp);
            }
            const tx = document.createElement('span');
            tx.textContent = g.display_name || g.name;
            item.appendChild(tx);
            item.addEventListener('click', () => selectGift(g.name));
            dd.appendChild(item);
        });
    }

    window.selectGift = name => {
        _selectedGift = name;
        document.getElementById('giftSearchInput').value = name;
        document.getElementById('giftDropdown').classList.remove('open');
        onGiftChange();
    };

    document.getElementById('giftSearchInput').addEventListener('focus', () => {
        document.getElementById('giftDropdown').classList.add('open');
        renderGiftDropdown(gifts);
    });
    document.getElementById('giftSearchInput').addEventListener('input', e => {
        const q = e.target.value.toLowerCase().trim();
        if (!q) { _selectedGift = ''; renderGiftDropdown(gifts); }
        else    { renderGiftDropdown(gifts.filter(g => (g.name||'').toLowerCase().includes(q))); }
        document.getElementById('giftDropdown').classList.add('open');
    });

    function onGiftChange() {
        const gift = gifts.find(g => g.name === _selectedGift);
        if (!gift) return;
        selectedModels.clear(); selectedBackdrops.clear(); updateClearButtons();
        if (!document.getElementById('modelsBody').classList.contains('open')) toggleCollapsible('models');
        document.getElementById('modelsSearch').value = '';
        document.getElementById('backdropsSearch').value = '';
        buildChips('modelsGrid',    gift.all_models    || gift.models    || gift.rare_models    || [], selectedModels,    'modelsCount',    'clearModelsBtn');
        buildChips('backdropsGrid', gift.all_backdrops || gift.backdrops || gift.rare_backdrops || [], selectedBackdrops, 'backdropsCount', 'clearBackdropsBtn');
    }

    function buildChips(gridId, items, set, countId, clearBtnId) {
        const grid   = document.getElementById(gridId);
        const sorted = sortByRarityAsc(items || []);
        if (!sorted.length) {
            grid.innerHTML = '<div style="grid-column:1/-1;padding:12px;text-align:center;color:#666;">Нет данных</div>';
            document.getElementById(countId).textContent = 0;
            document.getElementById(clearBtnId)?.classList.remove('visible');
            return;
        }
        grid.innerHTML = sorted.map((m, i) => {
            const pct = formatPct(normalizeRarityValue(m));
            const icon = (m.image_url || m.icon)
                ? `<img src="${escapeHtml(m.image_url||m.icon)}" class="chip-icon" onerror="this.style.display='none'">`
                : '';
            return `<div class="chip" data-name="${escapeHtml(m.name)}" data-grid="${gridId}" data-count="${countId}"
                onclick="toggleChip(this)" style="animation-delay:${i*0.02}s">
                ${icon}
                <div class="chip-info">
                    <span class="chip-name">${escapeHtml(m.name)}</span>
                    ${pct ? `<span class="chip-rarity">${escapeHtml(pct)}</span>` : ''}
                </div>
            </div>`;
        }).join('');
        document.getElementById(countId).textContent = 0;
        document.getElementById(clearBtnId)?.classList.remove('visible');
    }

    window.toggleChip = el => {
        const set     = el.dataset.grid === 'modelsGrid' ? selectedModels : selectedBackdrops;
        const countId = el.dataset.count;
        const clearId = el.dataset.grid === 'modelsGrid' ? 'clearModelsBtn' : 'clearBackdropsBtn';
        el.style.transform = 'scale(0.9)';
        setTimeout(() => { el.style.transform = ''; }, 150);
        el.classList.toggle('selected');
        set.has(el.dataset.name) ? set.delete(el.dataset.name) : set.add(el.dataset.name);
        const badge = document.getElementById(countId);
        badge.textContent = set.size;
        badge.style.transform = 'scale(1.2)';
        setTimeout(() => { badge.style.transform = 'scale(1)'; }, 200);
        document.getElementById(clearId)?.classList.toggle('visible', set.size > 0);
    };

    window.filterChips = (section, query) => {
        const q = query.toLowerCase();
        document.querySelectorAll(`#${section}Grid .chip`).forEach(c => {
            c.classList.toggle('hidden-chip', !c.dataset.name.toLowerCase().includes(q));
        });
    };

    function toggleCollapsible(id) {
        const body  = document.getElementById(id + 'Body');
        const arrow = document.getElementById(id + 'Arrow');
        const open  = body.classList.toggle('open');
        arrow.style.transform = open ? 'rotate(180deg)' : '';
    }
    window.toggleCollapsible = toggleCollapsible;

    // ── Monitor start/stop ────────────────────────────────────
    async function startMonitor() {
        if (!_selectedGift) return setStatus('Выберите подарок!', 'error');
        clearInterval(pollTimer);

        const minRaw = document.getElementById('priceMin')?.value;
        const maxRaw = document.getElementById('priceMax')?.value;
        const pMin = minRaw ? parseFloat(minRaw) : null;
        const pMax = maxRaw ? parseFloat(maxRaw) : null;

        const payload = {
            user_id:    USERID,
            gift_name:  _selectedGift,
            models:     [...selectedModels],
            backdrops:  [...selectedBackdrops],
            rarity_max: 100.0,
            price_min:  pMin,
            price_max:  pMax,
        };
        try {
            const r = await fetch(`${API}/monitor/start`, {
                method: 'POST', headers: { 'Content-Type':'application/json', ...H }, body: JSON.stringify(payload),
            });
            if (!r.ok) { setStatus('Ошибка старта', 'error'); return; }
            setStatus('✅ Мониторинг запущен', 'active');
            document.getElementById('btnStart').style.display = 'none';
            document.getElementById('btnStop').style.display  = 'block';
            initSearch();
            startStatusPolling();
        } catch { setStatus('Ошибка старта', 'error'); }
    }

    async function stopMonitor() {
        clearInterval(pollTimer); searchDone = true;
        try {
            await fetch(`${API}/monitor/stop`, {
                method: 'POST', headers: { 'Content-Type':'application/json', ...H },
                body: JSON.stringify({ user_id: USERID }),
            });
        } catch {}
        document.getElementById('btnStart').style.display = 'block';
        document.getElementById('btnStop').style.display  = 'none';
        setStatus('Монитор остановлен');
    }
    window.startMonitor = startMonitor;
    window.stopMonitor  = stopMonitor;

    function startStatusPolling() {
        clearInterval(pollTimer);
        pollTimer = setInterval(async () => {
            try {
                const r = await fetch(`${API}/monitors/${USERID}`, { headers: H });
                if (!r.ok) return;
                const data = await r.json();
                if (!data.running) {
                    clearInterval(pollTimer);
                    document.getElementById('btnStart').style.display = 'block';
                    document.getElementById('btnStop').style.display  = 'none';
                    setStatus('Монитор остановлен');
                }
            } catch {}
        }, 15000);
    }

    // ── Search (lazy-load) ────────────────────────────────────
    function initSearch() {
        searchPage = 0; searchTotalPages = 1;
        searchLoading = false; searchDone = false;
        allItems = []; sortedItems = []; renderedCount = 0;

        searchGift      = _selectedGift;
        searchModels    = [...selectedModels];
        searchBackdrops = [...selectedBackdrops];

        const minVal = document.getElementById('priceMin')?.value;
        const maxVal = document.getElementById('priceMax')?.value;
        searchPriceMin = minVal ? parseFloat(minVal) : null;
        searchPriceMax = maxVal ? parseFloat(maxVal) : null;

        document.getElementById('foundList').innerHTML =
            '<div class="empty-state"><div class="load-spinner"></div></div>';
        loadNextSearchPage();
    }

    async function loadNextSearchPage() {
        if (searchLoading || searchDone || !searchGift) return;
        searchLoading = true;
        const nextPage = searchPage + 1;
        const payload  = {
            gift_name: searchGift, page: nextPage, per_page: 20,
            models: searchModels, backdrops: searchBackdrops,
            price_min: searchPriceMin, price_max: searchPriceMax,
            ordering: currentSort,   // server-side ordering
        };
        try {
            const r = await fetch(`${API}/search/page`, {
                method: 'POST', headers: { 'Content-Type':'application/json', ...H }, body: JSON.stringify(payload),
            });
            if (!r.ok) { searchLoading = false; return; }
            const data = await r.json();
            searchPage       = nextPage;
            searchTotalPages = data.total_pages || 1;

            const existingIds = new Set(allItems.map(i => i.id));
            const fresh = (data.items || []).filter(i => !existingIds.has(i.id));
            allItems = [...allItems, ...fresh];

            if (data.stop_loading || nextPage >= searchTotalPages) searchDone = true;
            renderCards(allItems, true);
        } catch { console.error('Search page error'); }
        finally  { searchLoading = false; }
    }

    // ── Sort (server-side — resets and re-fetches from page 1) ──
    const SORT_LABELS = {
        price_asc:'Цена ↑', price_desc:'Цена ↓',
        num_asc:'ID ↑',     num_desc:'ID ↓',
        rarity_asc:'Ред. ↑',rarity_desc:'Ред. ↓',
    };

    function applySort(key) {
        currentSort = key;
        document.getElementById('sortOverlay').classList.remove('open');
        // Reset and re-fetch from page 1 with new ordering
        if (searchGift) {
            searchPage = 0; searchTotalPages = 1;
            searchLoading = false; searchDone = false;
            allItems = []; sortedItems = []; renderedCount = 0;
            document.getElementById('foundList').innerHTML =
                '<div class="empty-state"><div class="load-spinner"></div></div>';
            loadNextSearchPage();
        }
    }
    window.applySort = applySort;

    function openSortSheet() {
        document.querySelectorAll('.sort-option').forEach(el => {
            el.classList.toggle('active', el.dataset.sort === currentSort);
        });
        document.getElementById('sortOverlay').classList.add('open');
    }
    window.openSortSheet = openSortSheet;

    function closeSortSheet(e) {
        if (e.target === document.getElementById('sortOverlay'))
            document.getElementById('sortOverlay').classList.remove('open');
    }
    window.closeSortSheet = closeSortSheet;

    // ── Render ────────────────────────────────────────────────
    function renderCards(items, preserveScroll = false) {
        allItems = Array.isArray(items) ? items : [];
        const scrollY = preserveScroll ? window.scrollY : 0;
        sortedItems   = [...allItems]; // order comes from server
        renderedCount = 0;

        const list = document.getElementById('foundList');
        if (!sortedItems.length) {
            list.innerHTML = searchLoading
                ? '<div class="empty-state"><div class="load-spinner"></div></div>'
                : '<div class="empty-state">Ожидание лотов...</div>';
            if (preserveScroll) requestAnimationFrame(() => window.scrollTo(0, scrollY));
            return;
        }

        list.innerHTML = `
            <div class="found-header">
                <span class="found-count">НАЙДЕНО (${sortedItems.length}${searchDone ? '' : '+'})</span>
                <div class="sort-btn" onclick="openSortSheet()">
                    <span>⇅</span><span>${escapeHtml(SORT_LABELS[currentSort])}</span>
                </div>
            </div>
            <div class="found-grid" id="foundGrid"></div>
            <div class="load-sentinel" id="loadSentinel"></div>`;

        renderNextDOMPage();
        setupScrollObserver();
        if (preserveScroll) requestAnimationFrame(() => window.scrollTo(0, scrollY));
    }

    function buildCardHTML(item) {
        const modelPct    = formatPct(item.model_rarity);
        const backdropPct = formatPct(item.backdrop_rarity);
        const giftName    = item.gift_name || 'Подарок';
        const marketUrl   = item.market_url || item.gift_url || item.url || '#';

        // no loop attr = plays once
        const imgHtml = item.lottie_url
            ? `<lottie-player src="${escapeHtml(item.lottie_url)}" background="transparent" speed="1" autoplay></lottie-player>`
            : (item.image_url
                ? `<img src="${escapeHtml(item.image_url)}" loading="lazy" onerror="this.style.display='none'">`
                : `<div class="media-fallback">🎁</div>`);

        const priceLabel = `${escapeHtml(formatPrice(item.price_ton))} TON`;
        const buyLabel   = item.source ? `${priceLabel} · ${escapeHtml(item.source)}` : priceLabel;

        return `
            <div class="card-media">
                ${imgHtml}
                <div class="card-overlay-top">
                    <span class="source-tag-img">${escapeHtml(item.source || '')}</span>
                </div>
            </div>
            <div class="item-body">
                <div class="item-name-row">
                    <span class="item-gift-name">${escapeHtml(giftName)}</span>
                    ${item.number ? `<span class="item-num">#${escapeHtml(String(item.number))}</span>` : ''}
                </div>
                <div class="item-badges">
                    ${modelPct ? `<span class="ibadge ibadge-model">${escapeHtml(modelPct)}</span>` : ''}
                    ${item.backdrop && item.backdrop !== 'Default'
                        ? `<span class="ibadge ibadge-backdrop">${escapeHtml(item.backdrop)}${backdropPct ? ' · '+escapeHtml(backdropPct) : ''}</span>`
                        : ''}
                </div>
                <button class="card-buy-btn"
                    onclick="event.stopPropagation(); openTelegramLink(${JSON.stringify(marketUrl)})">
                    <span class="card-buy-icon">▽</span>${buyLabel}
                </button>
            </div>`;
    }

    function renderNextDOMPage() {
        const grid  = document.getElementById('foundGrid');
        if (!grid) return;
        const slice = sortedItems.slice(renderedCount, renderedCount + DOM_PAGE_SIZE);
        slice.forEach((item, i) => {
            const absIdx = renderedCount + i;
            const el = document.createElement('div');
            el.className = 'found-item';
            el.style.animationDelay = `${i * 0.02}s`;
            el.innerHTML = buildCardHTML(item);
            el.addEventListener('click', () => openModal(absIdx));
            grid.appendChild(el);
        });
        renderedCount += slice.length;
        updateSentinel();
    }

    function updateSentinel() {
        const s = document.getElementById('loadSentinel');
        if (!s) return;
        if (renderedCount < sortedItems.length || !searchDone) {
            s.innerHTML = '<div class="load-spinner"></div>';
            s.style.display = 'flex';
        } else {
            s.innerHTML = '<span class="load-done-tag">Всё загружено ✓</span>';
            s.style.display = 'flex';
        }
    }

    function setupScrollObserver() {
        if (scrollObserver) scrollObserver.disconnect();
        const sentinel = document.getElementById('loadSentinel');
        if (!sentinel) return;
        scrollObserver = new IntersectionObserver(entries => {
            if (!entries[0].isIntersecting) return;
            if (renderedCount < sortedItems.length) {
                renderNextDOMPage();
            } else if (!searchDone && !searchLoading) {
                loadNextSearchPage();
            }
        }, { threshold: 0.1 });
        scrollObserver.observe(sentinel);
    }

    // ── Modal ─────────────────────────────────────────────────
    window.openModal = idx => {
        const item = sortedItems[idx];
        if (!item) return;

        _modalGiftUrl   = item.gift_url   || item.url || '';
        _modalMarketUrl = item.market_url || item.gift_url || item.url || '';

        // Thumbnail
        const thumb = document.getElementById('modalThumb');
        thumb.innerHTML = '';

        if (item.lottie_url) {
            const player = document.createElement('lottie-player');
            player.setAttribute('src', item.lottie_url);
            player.setAttribute('background', 'transparent');
            player.setAttribute('speed', '1');
            player.setAttribute('autoplay', '');
            // no loop — plays once
            player.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
            thumb.appendChild(player);
        } else if (item.image_url) {
            const img = document.createElement('img');
            img.src = item.image_url;
            img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
            thumb.appendChild(img);
        } else {
            thumb.innerHTML = '<div class="modal-thumb-fallback">🎁</div>';
        }

        // TG badge on thumb
        const badge = document.createElement('a');
        badge.className = 'modal-tg-badge';
        badge.href = 'javascript:void(0)';
        badge.title = 'Открыть в Telegram';
        badge.innerHTML = '✈';
        badge.addEventListener('click', e => { e.stopPropagation(); openTelegramLink(_modalGiftUrl); });
        thumb.appendChild(badge);

        // Header info
        document.getElementById('modalGiftLabel').textContent = item.gift_name || '';
        document.getElementById('modalModelName').textContent = item.model     || '—';
        document.getElementById('modalNumber').textContent    = item.number    ? `#${item.number}` : '';
        document.getElementById('modalSource').textContent    = item.source    || '';

        // Rows
        const rows = [
            { label: 'Модель',  val: item.model   || '—', rarity: item.model_rarity },
            { label: 'Фон',     val: item.backdrop || '—', rarity: item.backdrop_rarity },
            { label: 'Символ',  val: item.symbol   || '—', rarity: item.symbol_rarity },
            { label: 'Цена',    val: `${formatPrice(item.price_ton)} TON`, rarity: null },
        ];
        document.getElementById('modalRows').innerHTML = rows.map(r => {
            const pct = formatPct(r.rarity);
            return `<div class="modal-row">
                <span class="modal-row-label">${escapeHtml(r.label)}</span>
                <div class="modal-row-right">
                    <span class="modal-row-val">${escapeHtml(r.val)}</span>
                    ${pct ? `<span class="modal-row-rarity">${escapeHtml(pct)}</span>` : ''}
                </div>
            </div>`;
        }).join('');

        // Buy button
        const buyBtn = document.getElementById('modalBuyBtn');
        buyBtn.textContent = `${formatPrice(item.price_ton)} TON • Купить на ${item.source || 'маркете'}`;
        buyBtn.onclick = e => { e.preventDefault(); e.stopPropagation(); openTelegramLink(_modalMarketUrl); };

        document.getElementById('modalOverlay').classList.add('open');
        document.body.style.overflow = 'hidden';
    };

    window.closeModal = e => {
        if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
    };
    window.closeModalDirect = () => {
        document.getElementById('modalOverlay').classList.remove('open');
        document.body.style.overflow = '';
        document.querySelector('#modalThumb lottie-player')?.stop?.();
    };

    // ── Initial status ────────────────────────────────────────
    async function checkInitialStatus() {
        try {
            const r = await fetch(`${API}/monitors/${USERID}`, { headers: H });
            if (!r.ok) return;
            const data = await r.json();
            if (data.running) {
                document.getElementById('btnStart').style.display = 'none';
                document.getElementById('btnStop').style.display  = 'block';
                setStatus('✅ Мониторинг активен', 'active');
                startStatusPolling();
                const cfg = data.config || {};
                const gName = cfg.gift_name || cfg.name;
                if (gName) {
                    _selectedGift   = gName;
                    searchGift      = gName;
                    searchModels    = cfg.rare_models    || [];
                    searchBackdrops = cfg.rare_backdrops || [];
                    searchPriceMin  = null; searchPriceMax = null;
                    document.getElementById('giftSearchInput').value = gName;
                    searchPage = 0; searchTotalPages = 1;
                    searchLoading = false; searchDone = false; allItems = [];
                    document.getElementById('foundList').innerHTML =
                        '<div class="empty-state"><div class="load-spinner"></div></div>';
                    loadNextSearchPage();
                }
            }
        } catch {}
    }

    document.addEventListener('click', e => {
        if (!e.target.closest('#giftSearchWrap'))
            document.getElementById('giftDropdown').classList.remove('open');
    });

    // ── Init ──────────────────────────────────────────────────
    async function init() {
        try {
            const r = await fetch(`${API}/auth/check/${USERID}`, { headers: H });
            if (!r.ok) {
                document.body.innerHTML = `
                    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center;padding:20px;">
                        <div style="font-size:48px;margin-bottom:16px;">🔒</div>
                        <div style="font-size:20px;font-weight:800;margin-bottom:8px;">Нет доступа</div>
                        <div style="color:#888;font-size:14px;">Ваш ID: ${USERID}<br>Обратитесь к администратору</div>
                    </div>`;
                return;
            }
            loadGifts();
        } catch { setStatus('Ошибка подключения', 'error'); }
    }

    init();
</script>
</body>
</html>
